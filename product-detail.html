<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Product Detail – Abokichi</title>
    <link rel="stylesheet" href="./css/product-detail.css" />
    <script src="./js/product-detail.js"></script>
    
  </head>
  <body>
   
    <!-- TOP BAR -->
    <div class="login-reg">
      <div class="left-items">
        <div class="currency">
          <span>USD</span>
          <img
            src="https://img.icons8.com/ios-glyphs/20/ffffff/expand-arrow--v1.png"
            alt=""
          />
        </div>
        <div class="store">
          <img
            src="https://img.icons8.com/material-sharp/20/ffffff/marker.png"
            alt=""
          />
          <span>Stores</span>
        </div>
      </div>
      <div class="right-item"><span>Login / Register</span></div>
    </div>

    <!-- NAVBAR -->
    <nav class="navbar">
      <a
        href="index.html"
        class="logo"
        style="text-decoration: none; color: inherit"
        >ABOKICHI</a
      >
      <ul class="menu">
        <li class="menu-1">
          Shop
          <img
            src="https://img.icons8.com/ios-glyphs/20//expand-arrow--v1.png"
            alt=""
          />
        </li>
        <li>Our story</li>
        <li>Recipes</li>
        <li>Contact</li>
      </ul>
      <div class="icons">
        <img src="https://img.icons8.com/ios-glyphs/25/search--v1.png" />
        <img src="https://img.icons8.com/material-outlined/24/filled-like.png" />
        <div class="cart-icon-wrap">
          <img src="https://img.icons8.com/ios-glyphs/25/shopping-bag.png" />
          <span class="cart-badge" id="cartBadge">0</span>
        </div>
      </div>
    </nav>

  
    <div class="breadcrumb" id="breadcrumb">
      <a href="index.html">Home</a><span>›</span>
      <a href="products.html">Shop</a><span>›</span>
      <span id="breadcrumb-name">Loading...</span>
    </div>

    <!-- Product Detail -->
    <div class="product-detail">
      <!-- Gallery -->
      <div class="gallery">
        <div class="main-image">
          <img id="mainImg" src="" alt="Product" />
        </div>
        <div class="thumbnails">
          <button class="thumb-arrow" id="prevThumb">‹</button>
          <div class="thumb-list" id="thumbList"></div>
          <button class="thumb-arrow" id="nextThumb">›</button>
        </div>
      </div>

      <!-- Info -->
      <div class="product-info">
        <h1 id="productName">Loading...</h1>

        <div class="price-row">
          <span class="price-now" id="priceNow"></span>
          <span class="price-old" id="priceOld"></span>
        </div>

        <div class="rating-row">
          <span class="stars" id="starsEl"></span>
          <span class="review-count" id="reviewCount"></span>
        </div>

        <p class="product-desc" id="productDesc"></p>

        

        <div class="quantity-row">
          <label>Quantity:</label>
          <div class="qty-ctrl">
            <button onclick="changeQty(-1)">−</button>
            <input type="number" id="qtyInput" value="0" min="0" max="99" />
            <button onclick="changeQty(1)">+</button>
          </div>
        </div>

        <div class="cta-row">
          <button class="btn-cart" onclick="addToCart()">Add to Cart</button>
          <button class="btn-buy" onclick="buyNow()">Buy Now</button>
        </div>

        <button class="wishlist-btn">
          <img
            width="20"
            height="20"
            src="https://img.icons8.com/ios-glyphs/30/hearts.png"
            alt="hearts"
          />Wishlist
        </button>

        <div class="share-row">
          <span>SHARE:</span>
          <img
            width="20"
            height="20"
            src="https://img.icons8.com/ios-glyphs/30/facebook-new.png"
            alt="facebook-new"
          />
          <img
            width="20"
            height="20"
            src="https://img.icons8.com/ios-glyphs/30/twitter--v1.png"
            alt="twitter--v1"
          />
          <img
            width="20"
            height="20"
            src="https://img.icons8.com/material-rounded/24/pinterest--v1.png"
            alt="pinterest--v1"
          />
        </div>
      </div>
    </div>

    <!-- DESCRIPTION -->
    <div class="desc-section">
      <div class="desc-tabs">
        <span class="active">Description</span>
        <span>Reviews</span>
        <span>Videos</span>
        <span>Comments</span>
      </div>
      <div class="desc-body">
        <p id="tabDesc"></p>
      </div>
    </div>

    <footer>
      <!-- FOOTER LINKS -->
      <div class="footer-links">
        <div class="footer-left">
          <div class="links">
            <h4>LINKS</h4>
            <div class="link-items">
              <p>About us</p>
              <p>Contact us</p>
              <p>Customer Service</p>
              <p>FAQs</p>
              <p>Sitemap</p>
            </div>
          </div>

          <div class="links">
            <h4>INFORMATION</h4>
            <div class="link-items">
              <p>Terms of Service</p>
              <p>Refund policy</p>
              <p>Press</p>
            </div>
          </div>
        </div>
        <div class="payments">
          <img src="./Assets/visa-logo.png" />
          <img src="./Assets/mastercard-logo.png" />
          <img src="https://img.icons8.com/ios-filled/50/apple-pay.png" />
          <img src="https://img.icons8.com/color/48/amex.png" />
        </div>
      </div>

      <!-- BOTTOM BAR -->
      <div class="footer-bottom">
        <div class="social">
          <img
            src="https://img.icons8.com/ios-filled/25/ffffff/facebook--v1.png"
          />
          <img src="https://img.icons8.com/ios-filled/25/ffffff/twitter.png" />
          <img
            src="https://img.icons8.com/ios-filled/25/ffffff/instagram-new.png"
          />
          <img
            src="https://img.icons8.com/ios-filled/25/ffffff/youtube-play.png"
          />
          <img
            src="https://img.icons8.com/ios-filled/25/ffffff/pinterest.png"
          />
          <img src="https://img.icons8.com/ios-filled/25/ffffff/linkedin.png" />
        </div>

        <p>© 2021 Abokichi.</p>
      </div>
    </footer>
     <script src="./js/product-detail.js"></script>
  </body>
</html>
